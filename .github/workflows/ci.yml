name: CI

on:
    pull_request:
        branches: [main]
    workflow_call:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Cache UI5 framework resources
              uses: actions/cache@v4
              with:
                  path: ~/.ui5
                  key: ui5-${{ matrix.node-version }}-${{ hashFiles('packages/*/ui5.yaml') }}
                  restore-keys: |
                      ui5-${{ matrix.node-version }}-
                      ui5-

            - run: npm ci

            - name: Commitlint
              if: github.event_name == 'pull_request' && matrix.node-version == 24
              run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

            - name: Check formatting
              run: npm run fmt:check

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Build
              run: npm run build

            - name: Pack check
              if: matrix.node-version == 24
              run: npm run pack:check

    tests:
        needs: validate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Cache UI5 framework resources
              uses: actions/cache@v4
              with:
                  path: ~/.ui5
                  key: ui5-tests-${{ hashFiles('packages/*/ui5.yaml') }}
                  restore-keys: ui5-tests-

            - run: npm ci

            - name: Run browser tests
              run: npm test

    windows-smoke:
        needs: validate
        runs-on: windows-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: QUnit smoke test
              run: npm run test:qunit

            - name: E2E smoke test
              run: npm run test:e2e
