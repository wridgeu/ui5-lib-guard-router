name: CI

on:
    pull_request:
        branches: [main]
    workflow_call:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Cache UI5 framework resources
              uses: actions/cache@v4
              with:
                  path: ~/.ui5
                  key: ui5-24-${{ hashFiles('packages/*/ui5*.yaml') }}
                  restore-keys: |
                      ui5-24-
                      ui5-

            - run: npm ci

            - name: Commitlint
              if: github.event_name == 'pull_request'
              run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

            - name: Check formatting
              run: npm run fmt:check

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Pack check
              run: npm run pack:check

    node22-pack-smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Cache UI5 framework resources
              uses: actions/cache@v4
              with:
                  path: ~/.ui5
                  key: ui5-22-${{ hashFiles('packages/*/ui5*.yaml') }}
                  restore-keys: |
                      ui5-22-
                      ui5-

            - run: npm ci

            - name: Build
              run: npm run build

            - name: Pack smoke
              run: npm run pack:smoke

    tests:
        needs: validate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Cache UI5 framework resources
              uses: actions/cache@v4
              with:
                  path: ~/.ui5
                  key: ui5-tests-${{ hashFiles('packages/*/ui5*.yaml') }}
                  restore-keys: ui5-tests-

            - run: npm ci

            - name: Run browser tests
              run: npm test

    compatibility-ui5-118:
        needs: validate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Cache UI5 framework resources
              uses: actions/cache@v4
              with:
                  path: ~/.ui5
                  key: ui5-compat-118-${{ hashFiles('packages/*/ui5*.yaml') }}
                  restore-keys: ui5-compat-118-

            - run: npm ci

            - name: Run OpenUI5 1.118 compatibility QUnit suite
              run: npm run test:qunit:compat:118

    windows-smoke:
        needs: validate
        runs-on: windows-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: QUnit smoke test
              run: npm run test:qunit

            - name: E2E smoke test
              run: npm run test:e2e
