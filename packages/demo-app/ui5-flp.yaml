specVersion: "4.0"
metadata:
    name: demo.app
type: application
framework:
    name: SAPUI5
    version: "1.144.0"
    libraries:
        - name: sap.m
        - name: sap.ui.core
        - name: sap.ushell
        - name: themelib_sap_horizon
server:
    customMiddleware:
        - name: ui5-tooling-transpile-middleware
          afterMiddleware: compression
          configuration:
              transpileDependencies: true
        - name: ui5-middleware-livereload
          afterMiddleware: compression
        - name: fiori-tools-preview
          afterMiddleware: ui5-middleware-livereload
          configuration:
              flp:
                  path: /test/flp.html
                  theme: sap_horizon
                  libs: true
                  enhancedHomePage: true
resources:
    configuration:
        paths:
            webapp: webapp
        propertiesFileSourceEncoding: UTF-8
builder:
    customTasks:
        - name: ui5-tooling-transpile-task
          afterTask: replaceVersion
